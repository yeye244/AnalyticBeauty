<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员管理 - 美丽推荐平台后台管理系统</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar"></aside>
    <div class="main-wrapper">
      <header class="header"></header>
      <main class="content">
        <div class="page-header">
          <span class="page-title">管理员管理</span>
          <div class="page-actions">
            <button class="btn btn-primary" onclick="showAddModal()">＋ 新增管理员</button>
          </div>
        </div>

        <!-- 搜索栏 -->
        <div class="search-bar">
          <div class="search-item">
            <label>管理员账号：</label>
            <input type="text" class="form-input" id="searchAccount" placeholder="请输入账号">
          </div>
          <div class="search-item">
            <label>角色：</label>
            <select class="form-select" id="searchRole">
              <option value="">全部</option>
              <option value="超级管理员">超级管理员</option>
              <option value="内容管理员">内容管理员</option>
              <option value="数据分析员">数据分析员</option>
            </select>
          </div>
          <div class="search-actions">
            <button class="btn btn-primary" onclick="loadData(1)">查询</button>
            <button class="btn btn-default" onclick="resetSearch()">重置</button>
          </div>
        </div>

        <!-- 表格 -->
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>管理员ID</th>
                <th>账号</th>
                <th>姓名</th>
                <th>角色</th>
                <th>电话号码</th>
                <th>最后登录</th>
                <th>状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
          <div class="pagination" id="pagination"></div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script>
    let currentPage = 1;
    const pageSize = 10;
    let total = 0;
    let currentList = [];

    const mockData = [];

    async function loadData(page = 1) {
      currentPage = page;
      const params = {
        page, pageSize,
        account: document.getElementById('searchAccount').value,
        role: document.getElementById('searchRole').value,
      };
      const res = await fetchGet('/admin/page', params);
      if (res.code === 0) {
        currentList = res.data.list || [];
        renderTable(res.data.list || [], res.data.total || 0);
      } else {
        showToast(res.msg || '查询失败', 'error');
        renderTable([], 0);
      }
    }

    function renderTable(list, totalCount) {
      total = totalCount;
      const tbody = document.getElementById('tableBody');
      if (!list.length) {
        tbody.innerHTML = emptyRow(8);
        renderPagination(document.getElementById('pagination'), total, currentPage, pageSize, loadData);
        return;
      }
      tbody.innerHTML = list.map(row => `
        <tr>
          <td>${row.AdminID}</td>
          <td class="text-bold">${escapeHTML(row.AdminAccount)}</td>
          <td>${escapeHTML(row.AdminName)}</td>
          <td><span class="tag ${row.Role === '超级管理员' ? 'tag-danger' : 'tag-info'}">${escapeHTML(row.Role)}</span></td>
          <td>${escapeHTML(row.Phone) || '-'}</td>
          <td>${formatDate(row.LastLogin)}</td>
          <td><span class="tag ${row.Status === '正常' ? 'tag-success' : 'tag-default'}">${row.Status}</span></td>
          <td class="col-actions">
            <button class="btn-link" onclick="showEditModal(${row.AdminID})">修改</button>
            <button class="btn-link" onclick="resetPassword(${row.AdminID})">重置密码</button>
            <button class="btn-link danger" onclick="deleteAdmin(${row.AdminID})">删除</button>
          </td>
        </tr>
      `).join('');
      renderPagination(document.getElementById('pagination'), total, currentPage, pageSize, loadData);
    }

    function resetSearch() {
      document.getElementById('searchAccount').value = '';
      document.getElementById('searchRole').value = '';
      loadData(1);
    }

    function showAddModal() {
      const bodyHTML = `
        <div class="form-row">
          <div class="form-group">
            <label>账号 <span class="required">*</span></label>
            <input type="text" class="form-input" id="formAccount" placeholder="请输入登录账号">
          </div>
          <div class="form-group">
            <label>姓名 <span class="required">*</span></label>
            <input type="text" class="form-input" id="formName" placeholder="请输入管理员姓名">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>密码 <span class="required">*</span></label>
            <input type="password" class="form-input" id="formPassword" placeholder="请输入登录密码">
          </div>
          <div class="form-group">
            <label>角色</label>
            <select class="form-select" id="formRole">
              <option value="超级管理员">超级管理员</option>
              <option value="内容管理员">内容管理员</option>
              <option value="数据分析员">数据分析员</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>电话号码</label>
          <input type="text" class="form-input" id="formPhone" placeholder="请输入电话号码">
        </div>
      `;
      showModal('新增管理员', bodyHTML, `
        <button class="btn btn-default" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="submitAdd()">确定新增</button>
      `);
    }

    async function submitAdd() {
      const data = {
        AdminAccount: document.getElementById('formAccount').value,
        AdminName: document.getElementById('formName').value,
        AdminPassword: document.getElementById('formPassword').value,
        Role: document.getElementById('formRole').value,
        Phone: document.getElementById('formPhone').value,
      };
      if (!data.AdminAccount || !data.AdminName || !data.AdminPassword) {
        showToast('请填写必填项', 'warning');
        return;
      }
      const res = await fetchPost('/admin/add', data);
      if (res.code === 0) {
        showToast('新增成功', 'success');
        closeModal();
        loadData(1);
      } else {
        showToast(res.msg || '操作失败', 'error');
      }
    }

    function showEditModal(id) {
      const row = currentList.find(r => r.AdminID === id);
      if (!row) return;
      const bodyHTML = `
        <div class="form-group">
          <label>管理员ID</label>
          <input type="text" class="form-input" value="${id}" disabled>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>账号 <span class="required">*</span></label>
            <input type="text" class="form-input" id="formAccount" value="${escapeHTML(row.AdminAccount)}">
          </div>
          <div class="form-group">
            <label>姓名 <span class="required">*</span></label>
            <input type="text" class="form-input" id="formName" value="${escapeHTML(row.AdminName)}">
          </div>
        </div>
        <div class="form-group">
          <label>角色</label>
          <select class="form-select" id="formRole">
            <option value="超级管理员" ${row.Role === '超级管理员' ? 'selected' : ''}>超级管理员</option>
            <option value="内容管理员" ${row.Role === '内容管理员' ? 'selected' : ''}>内容管理员</option>
            <option value="数据分析员" ${row.Role === '数据分析员' ? 'selected' : ''}>数据分析员</option>
          </select>
        </div>
        <div class="form-group">
          <label>电话号码</label>
          <input type="text" class="form-input" id="formPhone" value="${escapeHTML(row.Phone || '')}" placeholder="请输入电话号码">
        </div>
        <div class="form-group">
          <label>状态</label>
          <select class="form-select" id="formStatus">
            <option value="正常" ${row.Status === '正常' ? 'selected' : ''}>正常</option>
            <option value="已禁用" ${row.Status === '已禁用' ? 'selected' : ''}>已禁用</option>
          </select>
        </div>
      `;
      showModal('修改管理员信息', bodyHTML, `
        <button class="btn btn-default" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="submitEdit(${id})">保存修改</button>
      `);
    }

    async function submitEdit(id) {
      const data = {
        AdminID: id,
        AdminAccount: document.getElementById('formAccount').value,
        AdminName: document.getElementById('formName').value,
        Role: document.getElementById('formRole').value,
        Phone: document.getElementById('formPhone').value,
        Status: document.getElementById('formStatus').value,
      };
      if (!data.AdminAccount || !data.AdminName) {
        showToast('请填写必填项', 'warning');
        return;
      }
      const res = await fetchPost('/admin/update', data);
      if (res.code === 0) {
        showToast('修改成功', 'success');
        closeModal();
        loadData(currentPage);
      } else {
        showToast(res.msg || '操作失败', 'error');
      }
    }

    function resetPassword(id) {
      confirmDialog(`确定要重置管理员ID ${id} 的密码为 123456 吗？`, async () => {
        const res = await fetchPost('/admin/update', { AdminID: id, AdminPassword: '123456' });
        if (res.code === 0) {
          showToast('密码已重置为 123456', 'success');
        } else {
          showToast(res.msg || '操作失败', 'error');
        }
      });
    }

    function deleteAdmin(id) {
      confirmDialog(`确定要删除管理员ID为 ${id} 的账号吗？`, async () => {
        const res = await fetchPost('/admin/delete', { AdminID: id });
        if (res.code === 0) {
          showToast('删除成功', 'success');
          loadData(currentPage);
        } else {
          showToast(res.msg || '操作失败', 'error');
        }
      });
    }

    initPage('admin', ['系统管理', '管理员管理']);
    loadData(1);
  </script>
</body>
</html>
