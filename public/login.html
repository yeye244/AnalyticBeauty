<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 美丽推荐平台后台管理系统</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">美</div>
      <h1>美丽推荐平台</h1>
      <p>后台管理系统</p>
    </div>
    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label>管理员账号</label>
        <input type="text" class="form-input" id="username" placeholder="请输入账号" required>
      </div>
      <div class="form-group">
        <label>登录密码</label>
        <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="height:42px;font-size:15px;margin-top:6px;">登 录</button>
    </form>
  </div>

  <script src="js/common.js"></script>
  <script>
    // 如果已登录直接跳转
    if (sessionStorage.getItem('adminToken')) {
      window.location.href = 'index.html';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!username || !password) {
        showToast('请输入账号和密码', 'warning');
        return false;
      }

      const btn = e.target.querySelector('button[type="submit"]');
      const originalText = btn.textContent;
      btn.textContent = '登录中...';
      btn.disabled = true;

      // 调用登录接口
      const res = await fetchGet('/user/login', { username, password });

      btn.textContent = originalText;
      btn.disabled = false;

      if (res.code === 0) {
        sessionStorage.setItem('adminToken', 'logged_in');
        sessionStorage.setItem('adminName', res.data.uname || res.data.uaccess || username);
        sessionStorage.setItem('adminId', res.data.uid || '');
        showToast('登录成功', 'success');
        setTimeout(() => window.location.href = 'index.html', 800);
      } else {
        // 接口未就绪时允许演示登录
        if (username === 'admin' && password === '123456') {
          sessionStorage.setItem('adminToken', 'demo_token');
          sessionStorage.setItem('adminName', '系统管理员');
          sessionStorage.setItem('adminId', '1');
          showToast('登录成功（演示模式）', 'success');
          setTimeout(() => window.location.href = 'index.html', 800);
        } else {
          showToast(res.msg || '账号或密码错误', 'error');
        }
      }
      return false;
    }
  </script>
</body>
</html>
