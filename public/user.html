<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户管理 - 美丽推荐平台后台管理系统</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar"></aside>
    <div class="main-wrapper">
      <header class="header"></header>
      <main class="content">
        <div class="page-header">
          <span class="page-title">用户管理</span>
          <span class="page-desc">系统基础功能 - 对应表：User</span>
          <div class="page-actions">
            <button class="btn btn-primary" onclick="showAddModal()">＋ 新增用户</button>
          </div>
        </div>

        <!-- 搜索栏 -->
        <div class="search-bar">
          <div class="search-item">
            <label>用户昵称：</label>
            <input type="text" class="form-input" id="searchName" placeholder="请输入用户昵称">
          </div>
          <div class="search-item">
            <label>状态：</label>
            <select class="form-select" id="searchStatus">
              <option value="">全部</option>
              <option value="正常">正常</option>
              <option value="已禁用">已禁用</option>
            </select>
          </div>
          <div class="search-actions">
            <button class="btn btn-primary" onclick="loadData(1)">查询</button>
            <button class="btn btn-default" onclick="resetSearch()">重置</button>
          </div>
        </div>

        <!-- 表格 -->
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>用户ID</th>
                <th>昵称</th>
                <th>账号</th>
                <th>手机号</th>
                <th>性别</th>
                <th>注册时间</th>
                <th>状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
          <div class="pagination" id="pagination"></div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script>
    let currentPage = 1;
    const pageSize = 10;

    const mockData = [];

    async function loadData(page = 1) {
      currentPage = page;
      const params = {
        page, pageSize,
        name: document.getElementById('searchName').value,
        status: document.getElementById('searchStatus').value,
      };
      const res = await fetchGet('/user/page', params);
      if (res.code === 0) {
        renderTable(res.data.list || [], res.data.total || 0);
      } else {
        showToast(res.msg || '查询失败', 'error');
        renderTable([], 0);
      }
    }

    function renderTable(list, total) {
      const tbody = document.getElementById('tableBody');
      if (!list.length) {
        tbody.innerHTML = emptyRow(8);
        renderPagination(document.getElementById('pagination'), total, currentPage, pageSize, loadData);
        return;
      }
      tbody.innerHTML = list.map(row => `
        <tr>
          <td>${row.UserID}</td>
          <td class="text-bold">${escapeHTML(row.UserName)}</td>
          <td>${escapeHTML(row.Account)}</td>
          <td>${escapeHTML(row.Phone)}</td>
          <td>${escapeHTML(row.Gender)}</td>
          <td>${formatDate(row.RegisterTime)}</td>
          <td><span class="tag ${row.Status === '正常' ? 'tag-success' : 'tag-danger'}">${row.Status}</span></td>
          <td class="col-actions">
            <button class="btn-link" onclick="showEditModal(${row.UserID})">修改</button>
            <button class="btn-link danger" onclick="deleteUser(${row.UserID})">删除</button>
          </td>
        </tr>
      `).join('');
      renderPagination(document.getElementById('pagination'), total, currentPage, pageSize, loadData);
    }

    function resetSearch() {
      document.getElementById('searchName').value = '';
      document.getElementById('searchStatus').value = '';
      loadData(1);
    }

    function showAddModal() {
      const bodyHTML = `
        <div class="form-row">
          <div class="form-group">
            <label>昵称 <span class="required">*</span></label>
            <input type="text" class="form-input" id="formName" placeholder="请输入用户昵称">
          </div>
          <div class="form-group">
            <label>账号 <span class="required">*</span></label>
            <input type="text" class="form-input" id="formAccount" placeholder="请输入登录账号">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>手机号</label>
            <input type="text" class="form-input" id="formPhone" placeholder="请输入手机号">
          </div>
          <div class="form-group">
            <label>性别</label>
            <select class="form-select" id="formGender">
              <option value="女">女</option>
              <option value="男">男</option>
            </select>
          </div>
        </div>
      `;
      showModal('新增用户', bodyHTML, `
        <button class="btn btn-default" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="submitAdd()">确定新增</button>
      `);
    }

    async function submitAdd() {
      const data = {
        UserName: document.getElementById('formName').value,
        Account: document.getElementById('formAccount').value,
        Phone: document.getElementById('formPhone').value,
        Gender: document.getElementById('formGender').value,
      };
      if (!data.UserName || !data.Account) {
        showToast('请填写必填项', 'warning');
        return;
      }
      const res = await fetchPost('/user/add', data);
      if (res.code === 0) {
        showToast('新增成功', 'success');
        closeModal();
        loadData(1);
      } else {
        mockData.unshift({ UserID: mockData.length + 1, RegisterTime: new Date().toLocaleString(), Status: '正常', ...data, Phone: data.Phone || '-' });
        showToast('新增成功（演示模式）', 'success');
        closeModal();
        loadData(1);
      }
    }

    function showEditModal(id) {
      const row = mockData.find(r => r.UserID === id);
      if (!row) return;
      const bodyHTML = `
        <div class="form-group">
          <label>用户ID</label>
          <input type="text" class="form-input" value="${id}" disabled>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>昵称 <span class="required">*</span></label>
            <input type="text" class="form-input" id="formName" value="${escapeHTML(row.UserName)}">
          </div>
          <div class="form-group">
            <label>账号</label>
            <input type="text" class="form-input" id="formAccount" value="${escapeHTML(row.Account)}">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>手机号</label>
            <input type="text" class="form-input" id="formPhone" value="${escapeHTML(row.Phone)}">
          </div>
          <div class="form-group">
            <label>状态</label>
            <select class="form-select" id="formStatus">
              <option value="正常" ${row.Status === '正常' ? 'selected' : ''}>正常</option>
              <option value="已禁用" ${row.Status === '已禁用' ? 'selected' : ''}>已禁用</option>
            </select>
          </div>
        </div>
      `;
      showModal('修改用户信息', bodyHTML, `
        <button class="btn btn-default" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="submitEdit(${id})">保存修改</button>
      `);
    }

    async function submitEdit(id) {
      const data = {
        UserID: id,
        UserName: document.getElementById('formName').value,
        Account: document.getElementById('formAccount').value,
        Phone: document.getElementById('formPhone').value,
        Status: document.getElementById('formStatus').value,
      };
      if (!data.UserName) {
        showToast('昵称不能为空', 'warning');
        return;
      }
      const res = await fetchPost('/user/update', data);
      if (res.code === 0) {
        showToast('修改成功', 'success');
        closeModal();
        loadData(currentPage);
      } else {
        const row = mockData.find(r => r.UserID === id);
        if (row) Object.assign(row, data);
        showToast('修改成功（演示模式）', 'success');
        closeModal();
        loadData(currentPage);
      }
    }

    function deleteUser(id) {
      confirmDialog(`确定要删除用户ID为 ${id} 的记录吗？`, async () => {
        const res = await fetchPost('/user/delete', { UserID: id });
        if (res.code === 0) {
          showToast('删除成功', 'success');
          loadData(currentPage);
        } else {
          const idx = mockData.findIndex(r => r.UserID === id);
          if (idx > -1) mockData.splice(idx, 1);
          showToast('删除成功（演示模式）', 'success');
          loadData(currentPage);
        }
      });
    }

    initPage('user', ['用户管理']);
    loadData(1);
  </script>
</body>
</html>
