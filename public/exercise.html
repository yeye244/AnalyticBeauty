<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>运动计划管理 - 美丽推荐平台后台管理系统</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar"></aside>
    <div class="main-wrapper">
      <header class="header"></header>
      <main class="content">
        <div class="page-header">
          <span class="page-title">运动计划管理</span>
          <span class="page-desc">附加模块 - 对应表：Exercise</span>
          <div class="page-actions">
            <button class="btn btn-primary" onclick="showAddModal()">＋ 新增计划</button>
          </div>
        </div>

        <!-- 搜索栏 -->
        <div class="search-bar">
          <div class="search-item">
            <label>计划名称：</label>
            <input type="text" class="form-input" id="searchName" placeholder="如：晨间瑜伽">
          </div>
          <div class="search-item">
            <label>类型：</label>
            <select class="form-select" id="searchType">
              <option value="">全部</option>
              <option value="瑜伽">瑜伽</option>
              <option value="有氧">有氧</option>
              <option value="力量">力量</option>
              <option value="拉伸">拉伸</option>
            </select>
          </div>
          <div class="search-actions">
            <button class="btn btn-primary" onclick="loadData(1)">查询</button>
            <button class="btn btn-default" onclick="resetSearch()">重置</button>
          </div>
        </div>

        <!-- 表格 -->
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>计划ID</th>
                <th>计划名称</th>
                <th>类型</th>
                <th>时长(分钟)</th>
                <th>强度</th>
                <th>适用人群</th>
                <th>创建时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
          <div class="pagination" id="pagination"></div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script>
    let currentPage = 1;
    const pageSize = 10;

    const mockData = [
      { ExerciseID: 1, ExerciseName: '晨间唤醒瑜伽', Type: '瑜伽', Duration: 20, Intensity: '低', Target: '初学者', CreateTime: '2026-06-01 10:00' },
      { ExerciseID: 2, ExerciseName: '燃脂有氧操', Type: '有氧', Duration: 30, Intensity: '中', Target: '减脂人群', CreateTime: '2026-06-02 14:00' },
      { ExerciseID: 3, ExerciseName: '核心力量训练', Type: '力量', Duration: 40, Intensity: '高', Target: '塑形人群', CreateTime: '2026-06-03 09:30' },
      { ExerciseID: 4, ExerciseName: '睡前拉伸放松', Type: '拉伸', Duration: 15, Intensity: '低', Target: '所有人群', CreateTime: '2026-06-05 16:20' },
      { ExerciseID: 5, ExerciseName: '臀腿塑形', Type: '力量', Duration: 35, Intensity: '中', Target: '女性塑形', CreateTime: '2026-06-08 11:00' },
      { ExerciseID: 6, ExerciseName: '舒缓肩颈瑜伽', Type: '瑜伽', Duration: 25, Intensity: '低', Target: '上班族', CreateTime: '2026-06-10 13:30' },
    ];

    async function loadData(page = 1) {
      currentPage = page;
      const params = {
        page, pageSize,
        name: document.getElementById('searchName').value,
        type: document.getElementById('searchType').value,
      };
      const res = await fetchGet('/exercise/page', params);
      if (res.code === 0) {
        renderTable(res.data.list || [], res.data.total || 0);
      } else {
        let filtered = [...mockData];
        if (params.name) filtered = filtered.filter(r => r.ExerciseName.includes(params.name));
        if (params.type) filtered = filtered.filter(r => r.Type === params.type);
        const total = filtered.length;
        const start = (page - 1) * pageSize;
        renderTable(filtered.slice(start, start + pageSize), total);
      }
    }

    function renderTable(list, total) {
      const tbody = document.getElementById('tableBody');
      if (!list.length) {
        tbody.innerHTML = emptyRow(8);
        renderPagination(document.getElementById('pagination'), total, currentPage, pageSize, loadData);
        return;
      }
      const intensityColors = { '低': 'tag-success', '中': 'tag-warning', '高': 'tag-danger' };
      const typeColors = { '瑜伽': 'tag-primary', '有氧': 'tag-info', '力量': 'tag-warning', '拉伸': 'tag-success' };
      tbody.innerHTML = list.map(row => `
        <tr>
          <td>${row.ExerciseID}</td>
          <td class="text-bold">${escapeHTML(row.ExerciseName)}</td>
          <td><span class="tag ${typeColors[row.Type] || 'tag-default'}">${escapeHTML(row.Type)}</span></td>
          <td>${row.Duration} 分钟</td>
          <td><span class="tag ${intensityColors[row.Intensity] || 'tag-default'}">${row.Intensity}</span></td>
          <td>${escapeHTML(row.Target)}</td>
          <td>${formatDate(row.CreateTime)}</td>
          <td class="col-actions">
            <button class="btn-link" onclick="showEditModal(${row.ExerciseID})">修改</button>
            <button class="btn-link danger" onclick="deleteExercise(${row.ExerciseID})">删除</button>
          </td>
        </tr>
      `).join('');
      renderPagination(document.getElementById('pagination'), total, currentPage, pageSize, loadData);
    }

    function resetSearch() {
      document.getElementById('searchName').value = '';
      document.getElementById('searchType').value = '';
      loadData(1);
    }

    function showAddModal() {
      const bodyHTML = `
        <div class="form-group">
          <label>计划名称 <span class="required">*</span></label>
          <input type="text" class="form-input" id="formName" placeholder="如：晨间瑜伽">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>类型</label>
            <select class="form-select" id="formType">
              <option value="瑜伽">瑜伽</option>
              <option value="有氧">有氧</option>
              <option value="力量">力量</option>
              <option value="拉伸">拉伸</option>
            </select>
          </div>
          <div class="form-group">
            <label>时长(分钟) <span class="required">*</span></label>
            <input type="number" class="form-input" id="formDuration" placeholder="如：30">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>强度</label>
            <select class="form-select" id="formIntensity">
              <option value="低">低</option>
              <option value="中">中</option>
              <option value="高">高</option>
            </select>
          </div>
          <div class="form-group">
            <label>适用人群</label>
            <input type="text" class="form-input" id="formTarget" placeholder="如：初学者">
          </div>
        </div>
      `;
      showModal('新增运动计划', bodyHTML, `
        <button class="btn btn-default" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="submitAdd()">确定新增</button>
      `);
    }

    async function submitAdd() {
      const data = {
        ExerciseName: document.getElementById('formName').value,
        Type: document.getElementById('formType').value,
        Duration: document.getElementById('formDuration').value,
        Intensity: document.getElementById('formIntensity').value,
        Target: document.getElementById('formTarget').value,
      };
      if (!data.ExerciseName || !data.Duration) {
        showToast('请填写必填项', 'warning');
        return;
      }
      const res = await fetchPost('/exercise/add', data);
      if (res.code === 0) {
        showToast('新增成功', 'success');
        closeModal();
        loadData(1);
      } else {
        mockData.unshift({ ExerciseID: mockData.length + 1, CreateTime: new Date().toLocaleString(), ...data, Duration: +data.Duration });
        showToast('新增成功（演示模式）', 'success');
        closeModal();
        loadData(1);
      }
    }

    function showEditModal(id) {
      const row = mockData.find(r => r.ExerciseID === id);
      if (!row) return;
      const bodyHTML = `
        <div class="form-group">
          <label>计划ID</label>
          <input type="text" class="form-input" value="${id}" disabled>
        </div>
        <div class="form-group">
          <label>计划名称 <span class="required">*</span></label>
          <input type="text" class="form-input" id="formName" value="${escapeHTML(row.ExerciseName)}">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>类型</label>
            <select class="form-select" id="formType">
              ${['瑜伽','有氧','力量','拉伸'].map(t => `<option value="${t}" ${row.Type === t ? 'selected' : ''}>${t}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>时长(分钟) <span class="required">*</span></label>
            <input type="number" class="form-input" id="formDuration" value="${row.Duration}">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>强度</label>
            <select class="form-select" id="formIntensity">
              ${['低','中','高'].map(i => `<option value="${i}" ${row.Intensity === i ? 'selected' : ''}>${i}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>适用人群</label>
            <input type="text" class="form-input" id="formTarget" value="${escapeHTML(row.Target)}">
          </div>
        </div>
      `;
      showModal('修改运动计划', bodyHTML, `
        <button class="btn btn-default" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="submitEdit(${id})">保存修改</button>
      `);
    }

    async function submitEdit(id) {
      const data = {
        ExerciseID: id,
        ExerciseName: document.getElementById('formName').value,
        Type: document.getElementById('formType').value,
        Duration: document.getElementById('formDuration').value,
        Intensity: document.getElementById('formIntensity').value,
        Target: document.getElementById('formTarget').value,
      };
      if (!data.ExerciseName || !data.Duration) {
        showToast('请填写必填项', 'warning');
        return;
      }
      const res = await fetchPost('/exercise/update', data);
      if (res.code === 0) {
        showToast('修改成功', 'success');
        closeModal();
        loadData(currentPage);
      } else {
        const row = mockData.find(r => r.ExerciseID === id);
        if (row) Object.assign(row, data, { Duration: +data.Duration });
        showToast('修改成功（演示模式）', 'success');
        closeModal();
        loadData(currentPage);
      }
    }

    function deleteExercise(id) {
      confirmDialog(`确定要删除计划ID为 ${id} 的记录吗？`, async () => {
        const res = await fetchPost('/exercise/delete', { ExerciseID: id });
        if (res.code === 0) {
          showToast('删除成功', 'success');
          loadData(currentPage);
        } else {
          const idx = mockData.findIndex(r => r.ExerciseID === id);
          if (idx > -1) mockData.splice(idx, 1);
          showToast('删除成功（演示模式）', 'success');
          loadData(currentPage);
        }
      });
    }

    initPage('exercise', ['运动管理']);
    loadData(1);
  </script>
</body>
</html>
